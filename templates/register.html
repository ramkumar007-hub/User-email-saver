<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>REGISTER</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" placeholder="Enter your full name"
                   required maxlength="50" autocapitalize="words" style="text-transform: capitalize;">

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter your email"
                   required maxlength="100">

            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a username"
                   required maxlength="30">

            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="At least 6 characters"
                   required minlength="6">

            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password"
                   placeholder="Re-enter your password" required>

            <button type="submit">Register</button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
    </div>
</body>
</html>
